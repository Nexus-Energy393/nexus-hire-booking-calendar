<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script>(function(){try{var p=new URLSearchParams(location.search).get('nx-theme');var m=document.cookie.match(/(?:^|; )nexus-theme=(dark|light)/);var t=p||(m?m[1]:localStorage.getItem('nexus-theme'));var dark=t?t==='dark':window.matchMedia('(prefers-color-scheme: dark)').matches;document.documentElement.classList.toggle('dark',dark);}catch(e){}
window.addEventListener('message',function(e){if(e.data&&e.data.type==='nexus-theme'){document.documentElement.classList.toggle('dark',e.data.theme==='dark');}});
/* Inside the Nexus Hub (iframe) the Hub provides the top chrome — flag it so
   our own hub bar hides and the page doesn't stack duplicate headers. */
try{if(window.self!==window.top){document.documentElement.classList.add('nx-embedded');}}catch(e){document.documentElement.classList.add('nx-embedded');}})();</script>
<title>Nexus Hire Operations</title>
<meta name="description" content="Operational booking board for Nexus Energy generator hire and planned outage jobs." />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="tablet.css" />
<link rel="stylesheet" href="hub-switcher.css" />
  <link rel="icon" type="image/png" href="favicon.png" />
</head>
<body data-mode="desktop">
<header class="hub-bar">
  <a class="hub-back" href="https://hub.nexusenergy.au/" target="_top" aria-label="Back to Hub">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    <span>Hub</span>
  </a>
  <span class="hub-div"></span>
  <img class="hub-mark" src="nexus-mark.svg" alt="Nexus" />
  <span class="hub-title">Hire Operations</span>
</header>
<div class="app-shell">

<aside class="side-rail" id="sideRail" aria-label="Primary">
  <div class="rail-brand" title="Nexus hire operations"><span class="rail-mark"><img class="rail-mark-img" src="nexus-mark.svg" alt="Nexus" /></span></div>
<nav class="view-tabs rail-nav" id="viewTabs" aria-label="Views">
<button class="tab active" data-view="month" data-icon="calendar"><span class="rail-ico" aria-hidden="true"></span><span class="rail-lbl">Calendar</span></button>
<button class="tab" data-view="list" data-icon="list"><span class="rail-ico" aria-hidden="true"></span><span class="rail-lbl">List</span></button>
<button class="tab" data-view="fortnight" data-icon="fortnight"><span class="rail-ico" aria-hidden="true"></span><span class="rail-lbl">2 Week</span></button>
<button class="tab" data-view="week" data-icon="week"><span class="rail-ico" aria-hidden="true"></span><span class="rail-lbl">Week</span></button>
<button class="tab" data-view="day" data-icon="day"><span class="rail-ico" aria-hidden="true"></span><span class="rail-lbl">Day</span></button>
<button class="tab" data-view="fleet" data-icon="fleet"><span class="rail-ico" aria-hidden="true"></span><span class="rail-lbl">Fleet</span></button>
<button class="tab" data-view="staff" data-icon="staff"><span class="rail-ico" aria-hidden="true"></span><span class="rail-lbl">Staff</span></button>
<button class="tab" data-view="offhire" data-icon="offhire"><span class="rail-ico" aria-hidden="true"></span><span class="rail-lbl">Off Hire</span></button>
<button class="tab" data-view="missing" data-icon="alerts"><span class="rail-ico" aria-hidden="true"></span><span class="rail-lbl">Alerts</span></button>
<button class="tab" data-view="sync" data-icon="settings"><span class="rail-ico" aria-hidden="true"></span><span class="rail-lbl">Sync</span></button>
<a class="tab rail-link" data-icon="crm" href="https://hub.nexusenergy.au/api/launch/crm" target="_blank" rel="noopener" title="Open the Nexy CRM"><span class="rail-ico" aria-hidden="true"></span><span class="rail-lbl">CRM</span></a>
<a class="tab rail-link" data-icon="service" href="https://hub.nexusenergy.au/service" target="_blank" rel="noopener" title="Open Service Reports"><span class="rail-ico" aria-hidden="true"></span><span class="rail-lbl">Service</span></a>
<a class="tab rail-link" data-icon="survey" href="https://survey.nexusenergy.au/" target="_blank" rel="noopener" title="Open the Site Survey app"><span class="rail-ico" aria-hidden="true"></span><span class="rail-lbl">Survey</span></a>
</nav>
</aside>

<div class="app-main">

<header class="app-header">
<div class="app-titlewrap">
<span class="app-title">Nexus Hire Operations</span>
</div>
<div class="app-search">
<span class="app-search-ico" aria-hidden="true"></span>
<input type="search" id="searchInput" placeholder="Search customer, site, owner, job #&hellip;" aria-label="Search bookings" />
</div>
<div class="header-actions">
<span class="db-indicator" id="dbIndicator" title="Data source"><span class="db-dot"></span><span id="dbIndicatorText">Live data</span></span>
<span class="updated" id="lastUpdated">Last updated: --</span>
<button class="btn btn-icon" id="refreshBtn" title="Refresh now" aria-label="Refresh now"><span class="ico-refresh" aria-hidden="true">&#x21bb;</span></button>
<button class="btn btn-tv" id="tvBtn" title="Large-screen office display mode">Office screen</button>
<img class="brand-logo" src="nexus-logo.png" alt="Nexus Generator Hire &amp; Electrical" />
</div>
</header>

<section class="toolbar" id="toolbar">
<div class="nav-group">
<button class="btn ghost btn-icon" id="prevBtn" aria-label="Previous">&#8592;</button>
<button class="btn ghost" id="todayBtn">Today</button>
<button class="btn ghost btn-icon" id="nextBtn" aria-label="Next">&#8594;</button>
<span class="period-label" id="periodLabel"></span>
</div>
<div class="filters" id="filters">
<select id="filterType"><option value="">All job types</option><option value="planned-outage">Planned outage</option><option value="emergency">Emergency hire</option><option value="general">General hire</option><option value="service">Service</option></select>
<select id="filterStatus"><option value="">All statuses</option><option value="confirmed">Confirmed</option><option value="needs-duration">Needs duration</option><option value="needs-equipment">Needs equipment</option><option value="needs-review">Needs review</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select>
<select id="filterSize"><option value="">All generator sizes</option></select>
<select id="filterOwner"><option value="">All deal owners</option></select>
<label class="prospective-toggle" title="Show prospective (in-negotiation) planned outages as greyed tiles"><input type="checkbox" id="toggleProspective" checked /><span>Prospective</span></label>
</div>
</section>

<div class="conflict-banner" id="conflictBanner" hidden></div>

<main id="calendarRoot" class="calendar-root"></main>

<footer class="app-footer">
<span id="dataSourceNote">Sample data mode &mdash; connect Pipedrive credentials to go live. See README.</span>
</footer>

</div>
</div>

<div class="modal-backdrop" id="modalBackdrop" hidden>
<div class="modal" id="bookingModal" role="dialog" aria-modal="true"></div>
</div>

<script src="config.js"></script>
<script src="sample-data.js"></script>
<script src="resourcing-status.js"></script>
<script src="fleet.js"></script>
<script src="off-hire.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="app.js"></script>
<script src="service-overlay.js"></script>
<script src="staff.js"></script>
<script src="hub-switcher.js"></script>
</body>
</html>
